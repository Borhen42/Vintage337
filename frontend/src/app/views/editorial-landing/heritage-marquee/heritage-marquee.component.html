<div class="marquee" role="presentation">
  <div class="marquee__track animate-marquee">
    <div class="marquee__half">
      @for (i of [1, 2, 3, 4]; track i) {
        <span class="marquee__chunk">{{ 'landing.marquee.chunk' | translate }}</span>
      }
    </div>
    <div class="marquee__half" aria-hidden="true">
      @for (i of [1, 2, 3, 4]; track i) {
        <span class="marquee__chunk">{{ 'landing.marquee.chunk' | translate }}</span>
      }
    </div>
  </div>
</div>
