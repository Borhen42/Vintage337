<header class="heritage-nav film-grain" role="banner">
  <div class="heritage-nav__inner">
    <div class="heritage-nav__cluster">
      <a class="heritage-nav__brand" routerLink="/" (click)="closeMenu()">
        <img
          class="heritage-nav__logo"
          [src]="logoSrc()"
          (error)="onLogoError()"
          alt="Vintage 337"
          width="420"
          height="120"
          decoding="async"
        />
      </a>
      <nav
        id="heritage-nav-sections"
        class="heritage-nav__links"
        [class.heritage-nav__links--open]="menuOpen()"
        aria-label="Site sections"
      >
        <a
          routerLink="/archive"
          routerLinkActive="heritage-nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="heritage-nav__link"
          (click)="closeMenu()"
          >Archive</a
        >
        <a
          routerLink="/catalogue"
          routerLinkActive="heritage-nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="heritage-nav__link"
          (click)="closeMenu()"
          >Catalogue</a
        >
        <a
          routerLink="/collection"
          routerLinkActive="heritage-nav__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="heritage-nav__link"
          (click)="closeMenu()"
          >Collection</a
        >
        <a routerLink="/" fragment="contact" class="heritage-nav__link" (click)="closeMenu()">About</a>
        <form
          class="heritage-nav__drawer-search"
          role="search"
          (submit)="onDrawerSearchSubmit($event)"
        >
          <svg class="heritage-nav__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="11" cy="11" r="7" />
            <path d="M20 20l-4-4" />
          </svg>
          <label class="visually-hidden" for="heritage-nav-search-drawer">Search products by name</label>
          <input
            id="heritage-nav-search-drawer"
            class="heritage-nav__search-input"
            type="search"
            name="q"
            placeholder="Search archive"
            autocomplete="off"
            spellcheck="false"
            maxlength="120"
          />
          <button type="submit" class="heritage-nav__search-go" aria-label="Search">Go</button>
        </form>
      </nav>
    </div>

    <button
      type="button"
      class="heritage-nav__menu-btn"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="heritage-nav-sections"
      (click)="toggleMenu()"
    >
      <span class="visually-hidden">{{ menuOpen() ? 'Close menu' : 'Open menu' }}</span>
      @if (menuOpen()) {
        <svg class="heritage-nav__menu-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke-linecap="round" />
        </svg>
      } @else {
        <svg class="heritage-nav__menu-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round" />
        </svg>
      }
    </button>

    <div class="heritage-nav__right">
      <form class="heritage-nav__search" role="search" (submit)="onSearchSubmit($event)">
        <svg class="heritage-nav__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <path d="M20 20l-4-4" />
        </svg>
        <label class="visually-hidden" for="heritage-nav-search">Search products by name</label>
        <input
          id="heritage-nav-search"
          class="heritage-nav__search-input"
          type="search"
          name="q"
          placeholder="Search archive"
          autocomplete="off"
          spellcheck="false"
          maxlength="120"
        />
        <button type="submit" class="heritage-nav__search-submit" tabindex="-1" aria-hidden="true">Search</button>
      </form>
      @if (!auth.isAuthenticated()) {
        <a routerLink="/login" class="heritage-nav__icon-btn" aria-label="Sign in">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </a>
      } @else {
        <button type="button" class="heritage-nav__icon-btn" (click)="logout()" aria-label="Sign out">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      }
      <a routerLink="/" fragment="contact" class="heritage-nav__icon-btn" aria-label="About &amp; contact">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
          <circle cx="12" cy="12" r="9" />
          <path d="M12 11v5M12 8h.01" stroke-linecap="round" />
        </svg>
      </a>
      @if (auth.isCustomer()) {
        <a routerLink="/cart" class="heritage-nav__icon-btn heritage-nav__cart" aria-label="Your archive cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
            <path d="M6 6h15l-1.5 9h-12z" />
            <path d="M6 6L5 3H2" />
            <circle cx="9" cy="20" r="1" />
            <circle cx="18" cy="20" r="1" />
          </svg>
          @if (cart.totalQuantity() > 0) {
            <span class="heritage-nav__cart-badge">{{ cart.totalQuantity() }}</span>
          }
        </a>
      } @else if (!auth.isAuthenticated()) {
        <a
          routerLink="/login"
          [queryParams]="{ returnUrl: '/cart' }"
          class="heritage-nav__icon-btn heritage-nav__cart"
          aria-label="Sign in to open your archive cart"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true">
            <path d="M6 6h15l-1.5 9h-12z" />
            <path d="M6 6L5 3H2" />
            <circle cx="9" cy="20" r="1" />
            <circle cx="18" cy="20" r="1" />
          </svg>
        </a>
      } @else {
        <a
          routerLink="/"
          fragment="heritage-series"
          class="heritage-nav__icon-btn"
          aria-label="Client cart: use a customer account to hold pieces"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" aria-hidden="true" opacity="0.55">
            <path d="M6 6h15l-1.5 9h-12z" />
            <path d="M6 6L5 3H2" />
            <circle cx="9" cy="20" r="1" />
            <circle cx="18" cy="20" r="1" />
          </svg>
        </a>
      }
    </div>
  </div>
</header>
