# Local Postgres for Spring Boot (Flyway).
# Host port 5433 avoids conflict with another PostgreSQL already on 5432 (common on Windows).
services:
  db:
    image: postgres:16-alpine
    container_name: vintage337-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vintage337
    ports:
      - "5433:5432"
