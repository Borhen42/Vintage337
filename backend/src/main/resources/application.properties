spring.application.name=vintage337-backend
server.port=8080
# Behind Caddy/nginx; use NONE if something breaks on direct :8080 access
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# Optional local overrides (Supabase) — src/main/resources/application-local.properties (gitignored)
spring.config.import=optional:classpath:application-local.properties

# PostgreSQL (local or Supabase). Override: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Supabase: Project Settings - Database - Connection string (URI). Example:
# jdbc:postgresql://db.xxxxx.supabase.co:5432/postgres?sslmode=require
# Pooler port 6543: append &prepareThreshold=0 for Hibernate.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/vintage337}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# Default matches docker-compose (POSTGRES_PASSWORD=postgres). Override in prod via env.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema: Flyway migrations in db/migration; Hibernate only validates mapping
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (HS256) — set JWT_SECRET in production (at least 32 UTF-8 bytes)
jwt.secret=${JWT_SECRET:Vintage337ChangeThisSecretKeyTo32charsMin!!}
jwt.expiration-hours=24

# Multipart uploads (admin product images — up to 12 files; phone photos often exceed 12MB each)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=600MB
# Tomcat must allow large bodies before Spring parses multipart (defaults are too small → 413)
server.tomcat.max-http-form-post-size=600MB
server.tomcat.max-swallow-size=600MB
# Directory under working directory; served at /uploads/** (mount a volume in Docker for persistence)
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# Browser UI (Angular). Used when someone opens SPA paths on the API port (8080) — see SpaRedirectController.
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}
# Absolute base for PDF assets (product images, etc.)
app.public.url=${APP_PUBLIC_URL:http://localhost:8080}

# Comma-separated origins for CORS on /api/** (e.g. https://myapp.vercel.app,http://localhost:4200)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
